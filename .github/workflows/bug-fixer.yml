name: bug-fixer

# Production runtime: every 15 minutes the workflow polls the Firestore
# tickets collection, processes up to MAX_BUGS_PER_RUN bugs, opens PRs on
# the target repos, and exits. It is the GitHub-Actions equivalent of
# `python -m auto_bug_fixer daemon`.
#
# REQUIRED REPOSITORY SECRETS (Settings -> Secrets and variables -> Actions):
#   ANTHROPIC_API_KEY    - Anthropic API key (Claude)
#   FIREBASE_API_KEY     - Web API key of the Firebase project that holds the
#                          tickets collection (e.g. service-tickets-cb56a)
#   TALYA_TOKEN          - Talya's fine-grained PAT with Contents+PullRequests
#                          write on every target repo listed in repos.yaml
#   SMTP_HOST            - (only if EMAIL_ENABLED variable = "true")
#   SMTP_USERNAME        - (only if EMAIL_ENABLED variable = "true")
#   SMTP_PASSWORD        - (only if EMAIL_ENABLED variable = "true")
#
# REQUIRED REPOSITORY VARIABLES (Settings -> Variables):
#   FIREBASE_PROJECT_ID  - e.g. service-tickets-cb56a
#
# OPTIONAL REPOSITORY VARIABLES:
#   ANTHROPIC_MODEL, MAX_BUGS_PER_RUN, EMAIL_ENABLED, SMTP_PORT,
#   GIT_COMMITTER_NAME, GIT_COMMITTER_EMAIL, NOTIFY_FROM, NOTIFY_CC
#
# Status names (open / processing / mr_opened / failed) and the
# collection / type filter (tickets / bug) are intentionally NOT
# forwarded as env vars: the code defaults already match Talya's
# production schema. Override via src/auto_bug_fixer/config.py
# defaults if you need different values.
#
# Missing secrets evaluate to "" in GitHub Actions and Settings will reject
# them at startup, so the workflow fails fast rather than silently.
#
# Free-tier budget (private repo): 2000 min/month.
# Public repos get unlimited Actions minutes.

on:
  # Cron is intentionally DISABLED until we are confident the pipeline
  # is stable end-to-end. Re-enable by uncommenting the 'schedule' block
  # below (suggest "*/15 * * * *" so we poll Firestore every 15 minutes).
  #
  # schedule:
  #   - cron: "*/15 * * * *"
  #
  # Push trigger fires on changes to the workflow file itself, the repo
  # registry, requirements, or source. This lets us validate the
  # pipeline end-to-end after a deploy without needing actions:write on
  # any external PAT to call workflow_dispatch.
  push:
    branches: [main]
    paths:
      - ".github/workflows/bug-fixer.yml"
      - "repos.yaml"
      - "requirements.txt"
      - "src/**"
  workflow_dispatch:
    inputs:
      max_bugs:
        description: "Override MAX_BUGS_PER_RUN for this manual run"
        required: false
        default: "3"

concurrency:
  group: bug-fixer
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  process-bugs:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout (with indexes/ folder for repo context)
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run one pipeline tick
        env:
          PYTHONPATH: src
          # Anthropic
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          ANTHROPIC_MODEL: ${{ vars.ANTHROPIC_MODEL || 'claude-haiku-4-5-20251001' }}
          # Firestore (bug source) — REST + API key (no service-account key
          # because Talya's GCP project blocks key creation by org policy).
          # Status / collection / type-filter are NOT forwarded from repo
          # variables on purpose: the code defaults already match Talya's
          # production schema (collection="tickets", type filter="bug",
          # status="open"). Forwarding `${{ vars.X }}` for an unset variable
          # silently overrides those defaults with the empty string.
          FIREBASE_PROJECT_ID: ${{ vars.FIREBASE_PROJECT_ID }}
          FIREBASE_API_KEY: ${{ secrets.FIREBASE_API_KEY }}
          MAX_BUGS_PER_RUN: ${{ inputs.max_bugs || vars.MAX_BUGS_PER_RUN || '3' }}
          # GitHub (PR creation on TARGET repos) — Talya's PAT
          GITHUB_TOKEN: ${{ secrets.TALYA_TOKEN }}
          GIT_COMMITTER_NAME: ${{ vars.GIT_COMMITTER_NAME || 'auto-bug-fixer[bot]' }}
          GIT_COMMITTER_EMAIL: ${{ vars.GIT_COMMITTER_EMAIL || 'auto-bug-fixer-bot@users.noreply.github.com' }}
          # Email is disabled by default. Flip EMAIL_ENABLED variable to "true"
          # in repo settings (Variables) once SMTP_* secrets exist.
          EMAIL_ENABLED: ${{ vars.EMAIL_ENABLED || 'false' }}
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ vars.SMTP_PORT || '587' }}
          SMTP_USERNAME: ${{ secrets.SMTP_USERNAME }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          NOTIFY_FROM: ${{ vars.NOTIFY_FROM }}
          NOTIFY_CC: ${{ vars.NOTIFY_CC }}
          # Sandbox + indexing
          WORKSPACE_DIR: /tmp/auto-bug-fixer
          REPOS_FILE: ${{ github.workspace }}/repos.yaml
          INDEX_DIR: ${{ github.workspace }}/indexes
          # Disable health server (irrelevant in Actions)
          HEALTH_ENABLED: "false"
          # Logging
          LOG_LEVEL: INFO
          LOG_FORMAT: json
        run: python -m auto_bug_fixer run-once

      - name: Commit history ledger (if changed)
        run: |
          git config user.name  "auto-bug-fixer[bot]"
          git config user.email "auto-bug-fixer[bot]@users.noreply.github.com"
          if [[ -n "$(git status --porcelain indexes/*.history.jsonl 2>/dev/null)" ]]; then
            git add indexes/*.history.jsonl
            git commit -m "chore(history): record fix outcomes [skip ci]"
            git push
          else
            echo "No history changes."
          fi
