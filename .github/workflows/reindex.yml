name: reindex

# Once a day, regenerate the per-repo knowledge index for every entry in
# repos.yaml and commit the resulting JSON files back to indexes/. The
# bug-fixer workflow then reads those committed indexes on every run.
#
# REQUIRED REPOSITORY SECRETS (same set as bug-fixer.yml):
#   ANTHROPIC_API_KEY    - required by Settings, not actually used here
#   FIREBASE_API_KEY     - required by Settings, not actually used here
#   TALYA_TOKEN          - Talya's PAT, used to clone target (private) repos
#                          in repos.yaml. MUST be Talya's PAT, not Eilon's,
#                          because Eilon has no access to talya-debug/* repos.
# REQUIRED REPOSITORY VARIABLES:
#   FIREBASE_PROJECT_ID  - required by Settings, not actually used here

on:
  schedule:
    - cron: "0 4 * * *"
  workflow_dispatch:

concurrency:
  group: reindex
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  reindex:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Configure git committer
        run: |
          git config user.name  "auto-bug-fixer[bot]"
          git config user.email "auto-bug-fixer[bot]@users.noreply.github.com"

      - name: Build indexes for every repo in repos.yaml
        env:
          PYTHONPATH: src
          # The indexer needs a token that can clone target repos. Talya's
          # repos are private, so we MUST use TALYA_TOKEN (not GH_TOKEN).
          GITHUB_TOKEN: ${{ secrets.TALYA_TOKEN }}
          GIT_COMMITTER_NAME: ${{ vars.GIT_COMMITTER_NAME || 'auto-bug-fixer[bot]' }}
          GIT_COMMITTER_EMAIL: ${{ vars.GIT_COMMITTER_EMAIL || 'auto-bug-fixer-bot@users.noreply.github.com' }}
          # Required by Settings (not actually used in index-once mode).
          # Email is forced off in indexing mode so SMTP_* secrets are optional.
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          FIREBASE_PROJECT_ID: ${{ vars.FIREBASE_PROJECT_ID }}
          FIREBASE_API_KEY: ${{ secrets.FIREBASE_API_KEY }}
          EMAIL_ENABLED: "false"
          REPOS_FILE: ${{ github.workspace }}/repos.yaml
          INDEX_DIR: ${{ github.workspace }}/indexes
          HEALTH_ENABLED: "false"
          LOG_LEVEL: INFO
          LOG_FORMAT: json
        run: python -m auto_bug_fixer index-once

      - name: Commit refreshed indexes (if changed)
        run: |
          if [[ -n "$(git status --porcelain indexes/)" ]]; then
            git add indexes/
            git commit -m "chore(indexes): daily refresh [skip ci]"
            git push
          else
            echo "No index changes."
          fi
